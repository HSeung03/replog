[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.fileinfo", "php84Extensions.openssl", "php84Extensions.curl", "php84Extensions.zip", "composer"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-dev --no-scripts --no-interaction"]

[start]
cmd = "php artisan config:clear && php artisan route:clear && php artisan config:cache && php artisan migrate --force && php -S 0.0.0.0:$PORT -t public"
